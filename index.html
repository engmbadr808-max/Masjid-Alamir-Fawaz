<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جامع الأمير فواز</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
color:white;
text-align:center;
background:url('https://upload.wikimedia.org/wikipedia/commons/5/5f/Al-Masjid_an-Nabawi.jpg') no-repeat center center fixed;
background-size:cover;
overflow:hidden;
}

.overlay{
background:rgba(0,0,0,0.75);
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
}

/* ===== العنوان ===== */
.header{
padding:20px;
}

.header h1{
margin:0;
font-size:65px;
color:#FFD700;
font-family:'Aref Ruqaa', serif;
letter-spacing:2px;
text-shadow:
0 0 5px #fff,
0 0 10px #FFD700,
0 0 20px #B8860B,
2px 2px 10px black;
}

.date{
font-size:22px;
margin-top:8px;
}

.clock{
font-size:60px;
font-weight:bold;
color:#00FF99;
margin-top:15px;
}

/* ===== الأذكار في المنتصف ===== */
.azkar-box{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.azkar{
font-size:34px;
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:20px;
width:70%;
min-height:120px;
display:flex;
align-items:center;
justify-content:center;
}

/* ===== الشريط السفلي ===== */
.prayer-bar{
background:rgba(0,0,0,0.9);
padding:20px 10px;
display:flex;
justify-content:space-around;
flex-wrap:wrap;
}

.prayer{
font-size:26px;
padding:10px 20px;
}

.prayer span{
display:block;
font-size:20px;
color:#FFD700;
}

.countdown{
color:#00FF99;
font-size:18px;
margin-top:5px;
}

@media(max-width:768px){
.header h1{font-size:40px;}
.clock{font-size:40px;}
.azkar{font-size:22px;width:90%;}
.prayer{font-size:18px;}
}
</style>
</head>

<body>
<div class="overlay">

<div class="header">
<h1>جامع الأمير فواز</h1>
<div class="date" id="date"></div>
<div class="clock" id="clock"></div>
</div>

<div class="azkar-box">
<div class="azkar" id="azkar">جاري تحميل الأذكار...</div>
</div>

<div class="prayer-bar" id="prayers"></div>

</div>

<script>

/* ===== الساعة 12 ساعة ===== */
function updateClock(){
let now=new Date();
let hours=now.getHours();
let minutes=now.getMinutes();
let seconds=now.getSeconds();
let ampm=hours>=12?'PM':'AM';
hours=hours%12;
hours=hours?hours:12;
minutes=minutes<10?'0'+minutes:minutes;
seconds=seconds<10?'0'+seconds:seconds;
document.getElementById("clock").innerText=
hours+":"+minutes+":"+seconds+" "+ampm;
}
setInterval(updateClock,1000);
updateClock();

/* ===== التاريخ هجري وميلادي ===== */
function updateDate(){
let now=new Date();
let gregorian=now.toLocaleDateString('ar-SA');
let hijri=new Intl.DateTimeFormat('ar-SA-u-ca-islamic',
{day:'numeric',month:'long',year:'numeric'}).format(now);
document.getElementById("date").innerText=
"الميلادي: "+gregorian+" | الهجري: "+hijri;
}
updateDate();

/* ===== أوقات الصلاة ===== */
async function loadPrayerTimes(){
let res=await fetch("https://api.aladhan.com/v1/timingsByCity?city=Jeddah&country=SA&method=4");
let data=await res.json();
let timings=data.data.timings;

let prayers={
الفجر:timings.Fajr,
الظهر:timings.Dhuhr,
العصر:timings.Asr,
المغرب:timings.Maghrib,
العشاء:timings.Isha
};

let container=document.getElementById("prayers");
container.innerHTML="";

for(let name in prayers){
let adhan=prayers[name];
let iqama=addMinutes(adhan,10);

let div=document.createElement("div");
div.className="prayer";
div.innerHTML=
name+
"<span>الأذان: "+format12(adhan)+"</span>"+
"<span>الإقامة: "+format12(iqama)+"</span>"+
"<div class='countdown' id='count_"+name+"'></div>";

container.appendChild(div);
startCountdown(name,iqama);
}
}
loadPrayerTimes();

/* تحويل 12 ساعة */
function format12(time){
let [h,m]=time.split(":");
h=parseInt(h);
let ampm=h>=12?'PM':'AM';
h=h%12;
h=h?h:12;
return h+":"+m+" "+ampm;
}

/* إضافة دقائق */
function addMinutes(time,mins){
let [h,m]=time.split(":");
let date=new Date();
date.setHours(h);
date.setMinutes(m);
date.setSeconds(0);
date.setMinutes(date.getMinutes()+mins);
return date.getHours()+":"+String(date.getMinutes()).padStart(2,'0');
}

/* عداد الإقامة */
function startCountdown(name,iqama){
setInterval(()=>{
let now=new Date();
let [h,m]=iqama.split(":");
let target=new Date();
target.setHours(h);
target.setMinutes(m);
target.setSeconds(0);
let diff=target-now;
if(diff>0){
let min=Math.floor(diff/60000);
let sec=Math.floor((diff%60000)/1000);
document.getElementById("count_"+name).innerText=
"متبقي على الإقامة: "+min+" دقيقة "+sec+" ثانية";
}else{
document.getElementById("count_"+name).innerText="تمت الإقامة";
}
},1000);
}

/* ===== الأذكار ===== */
let azkarList=[
"سبحان الله وبحمده سبحان الله العظيم",
"لا إله إلا الله وحده لا شريك له له الملك وله الحمد وهو على كل شيء قدير",
"اللهم صل وسلم على نبينا محمد",
"أستغفر الله وأتوب إليه",
"اللهم اغفر لي ولوالدي وللمسلمين أجمعين"
];

let azkarIndex=0;
function changeZikr(){
document.getElementById("azkar").innerText=
azkarList[azkarIndex];
azkarIndex=(azkarIndex+1)%azkarList.length;
}
setInterval(changeZikr,8000);
changeZikr();

</script>

</body>
</html>
