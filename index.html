<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مسجد الامير فواز</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#111;
font-family:'Tahoma';
color:white;
overflow:hidden;
}

/* الشريط العلوي */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 40px;
background:linear-gradient(90deg,#111,#222);
color:#d4af37;
font-size:20px;
}

.mosque-name{
font-size:32px;
font-weight:bold;
}

/* المحتوى الرئيسي */
.main{
display:flex;
height:65vh;
padding:20px;
}

/* لوحة الآية */
.verse-box{
flex:2;
background:linear-gradient(145deg,#c9a227,#e5c76b);
color:#000;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
text-align:center;
padding:40px;
box-shadow:0 0 40px rgba(212,175,55,0.5);
}

/* الساعة */
.clock-box{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.analog-clock{
width:220px;
height:220px;
border:8px solid #d4af37;
border-radius:50%;
position:relative;
background:white;
}

.hand{
position:absolute;
width:50%;
height:2px;
background:black;
top:50%;
transform-origin:100%;
}

.digital-clock{
font-size:40px;
color:#ff3333;
margin-top:15px;
}

/* الشريط السفلي */
.bottom-bar{
position:absolute;
bottom:0;
width:100%;
background:#000;
padding:15px 0;
display:flex;
justify-content:space-around;
border-top:4px solid #d4af37;
}

.prayer{
text-align:center;
font-size:22px;
color:#d4af37;
}

.active{
color:#00ff00;
font-weight:bold;
}

</style>
</head>
<body>

<div class="top-bar">
<div class="mosque-name">🕌 مسجد الامير فواز</div>
<div id="date"></div>
<div id="weather">جاري تحميل الطقس...</div>
</div>

<div class="main">

<div class="verse-box">
إِنَّ ٱللَّهَ وَمَلَـٰٓئِكَتَهُۥ يُصَلُّونَ عَلَى ٱلنَّبِىِّ
يَـٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوا۟ صَلُّوا۟ عَلَيْهِ وَسَلِّمُوا۟ تَسْلِيمًا
</div>

<div class="clock-box">
<div class="analog-clock" id="analog"></div>
<div class="digital-clock" id="digital"></div>
</div>

</div>

<div class="bottom-bar" id="prayerBar"></div>

<script>

// التاريخ
function updateDate(){
const now=new Date();
document.getElementById("date").innerText=
now.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
updateDate();

// الساعة الرقمية
function updateClock(){
const now=new Date();
document.getElementById("digital").innerText=
now.toLocaleTimeString('ar-SA');
}
setInterval(updateClock,1000);
updateClock();

// الطقس (ضع مفتاح API)
async function getWeather(){
const apiKey="YOUR_OPENWEATHER_KEY";
try{
const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Jeddah&appid=${apiKey}&units=metric&lang=ar`);
const data=await res.json();
document.getElementById("weather").innerText=
`🌤 ${data.main.temp}°C - ${data.weather[0].description}`;
}catch{
document.getElementById("weather").innerText="تعذر تحميل الطقس";
}
}
getWeather();

// مواقيت الصلاة
async function getPrayerTimes(){
const res=await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Jeddah&country=Saudi Arabia&method=4`);
const data=await res.json();
const t=data.data.timings;

const prayers={
الفجر:t.Fajr,
الشروق:t.Sunrise,
الظهر:t.Dhuhr,
العصر:t.Asr,
المغرب:t.Maghrib,
العشاء:t.Isha
};

let html="";
for(let name in prayers){
html+=`<div class="prayer">${name}<br>${prayers[name]}</div>`;
}
document.getElementById("prayerBar").innerHTML=html;
}
getPrayerTimes();

</script>

</body>
</html>

</body>
</html>
