<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مسجد الامير فواز - النظام الذكي</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Tahoma';
background:linear-gradient(180deg,#0c1e2b,#123c4a);
color:white;
text-align:center;
overflow:hidden;
}

.mosque{
font-size:48px;
color:#00ffcc;
margin-top:10px;
}

.clock{
font-size:70px;
color:#FFD700;
}

.weather{
font-size:22px;
margin:10px;
}

.section{
margin-top:15px;
}

.prayer{
font-size:30px;
margin:10px;
display:flex;
justify-content:space-between;
width:60%;
margin-left:auto;
margin-right:auto;
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:10px;
}

.active{
background:#006400;
}

.countdown{
font-size:40px;
color:#ff4444;
margin-top:10px;
}

.azkar{
font-size:28px;
margin:20px;
width:80%;
margin-left:auto;
margin-right:auto;
line-height:1.8;
color:#ffffcc;
}
</style>
</head>

<body>

<div class="mosque">🕌 مسجد الامير فواز</div>
<div class="clock" id="clock"></div>

<div class="weather" id="weather">جاري تحميل الطقس...</div>

<div id="date"></div>

<div id="prayers"></div>

<div class="countdown" id="countdown"></div>

<div class="azkar" id="azkar"></div>

<script>

// ---------------- الساعة ----------------
function updateClock(){
const now=new Date();
document.getElementById("clock").innerText=
now.toLocaleTimeString('ar-SA');
}
setInterval(updateClock,1000);
updateClock();

// ---------------- الطقس ----------------
async function getWeather(){
const apiKey="YOUR_OPENWEATHER_KEY";
const city="Jeddah";
try{
const res=await fetch(
`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=ar`
);
const data=await res.json();
document.getElementById("weather").innerHTML=
`🌤 خارج المسجد: ${data.main.temp}°C - ${data.weather[0].description}
<br>🌡 داخل المسجد: 24°C`;
}catch{
document.getElementById("weather").innerText="تعذر تحميل الطقس";
}
}
getWeather();

// ---------------- مواقيت الصلاة ----------------
let prayerTimes={};

async function getPrayerTimes(){
const res=await fetch(
`https://api.aladhan.com/v1/timingsByCity?city=Jeddah&country=Saudi Arabia&method=4`
);
const data=await res.json();
prayerTimes=data.data.timings;
renderPrayers();
}
getPrayerTimes();

function renderPrayers(){
const container=document.getElementById("prayers");
container.innerHTML="";
const names={
Fajr:"الفجر",
Dhuhr:"الظهر",
Asr:"العصر",
Maghrib:"المغرب",
Isha:"العشاء"
};
for(let key in names){
container.innerHTML+=
`<div class="prayer" id="${key}">
<span>${names[key]}</span>
<span>${prayerTimes[key]}</span>
</div>`;
}
checkPrayerStatus();
}

// ---------------- العد التنازلي ----------------
function checkPrayerStatus(){
setInterval(()=>{
const now=new Date();
for(let key in prayerTimes){
const [h,m]=prayerTimes[key].split(":");
let prayerDate=new Date();
prayerDate.setHours(h,m,0);

if(now<prayerDate){
let diff=(prayerDate-now)/1000;
let min=Math.floor(diff/60);
let sec=Math.floor(diff%60);
document.getElementById("countdown").innerText=
`متبقي على الأذان ${min}:${sec}`;
break;
}
}
},1000);
}

// ---------------- الأذكار ----------------
const azanZikr=
"ردد مع المؤذن: الله أكبر الله أكبر... اللهم رب هذه الدعوة التامة والصلاة القائمة...";

const betweenZikr=
"الدعاء بين الأذان والإقامة لا يُرد، أكثر من الدعاء والاستغفار.";

const afterPrayerZikr=
"أستغفر الله (3 مرات) اللهم أنت السلام ومنك السلام... سبحان الله 33، الحمد لله 33، الله أكبر 34.";

function showAzkar(text){
document.getElementById("azkar").innerText=text;
}

</script>

</body>
</html>
