<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مواقيت الصلاة - المسجد</title>
<style>
body {
    margin: 0;
    font-family: 'Tahoma', sans-serif;
    background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.header {
    padding: 20px;
    font-size: 40px;
    font-weight: bold;
}

.date {
    font-size: 25px;
    margin-bottom: 20px;
}

.prayer-container {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
}

.prayer {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    width: 200px;
    font-size: 30px;
}

.prayer-name {
    font-weight: bold;
    margin-bottom: 10px;
}

.footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    font-size: 20px;
}
</style>
</head>

<body>

<div class="header">مواقيت الصلاة</div>
<div class="date" id="date"></div>

<div class="prayer-container" id="prayerTimes"></div>

<div class="footer">نسأل الله القبول</div>

<script>
const city = "Jeddah";
const country = "Saudi Arabia";

async function getPrayerTimes() {
    const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=${country}&method=4`);
    const data = await response.json();

    const timings = data.data.timings;

    const prayers = {
        "الفجر": timings.Fajr,
        "الظهر": timings.Dhuhr,
        "العصر": timings.Asr,
        "المغرب": timings.Maghrib,
        "العشاء": timings.Isha
    };

    const container = document.getElementById("prayerTimes");
    container.innerHTML = "";

    for (const [name, time] of Object.entries(prayers)) {
        container.innerHTML += `
            <div class="prayer">
                <div class="prayer-name">${name}</div>
                <div>${time}</div>
            </div>
        `;
    }

    document.getElementById("date").innerText =
        data.data.date.hijri.date + " هـ | " +
        data.data.date.gregorian.date;
}

getPrayerTimes();
</script>

</body>
</html>

</body>
</html>
