<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>جامع الأمير فواز</title>

<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">

<style>

body{

margin:0;
font-family:Tahoma;
color:white;
text-align:center;
height:100vh;

display:flex;
flex-direction:column;
justify-content:space-between;

background:url("https://upload.wikimedia.org/wikipedia/commons/3/3f/Al-Masjid_an-Nabawi_Medina.jpg") center/cover no-repeat fixed;

}

/* طبقة تعتيم */

body::before{

content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;

}

/* العنوان */

.header{

padding-top:30px;

}

.header h1{

font-size:70px;
font-family:'Aref Ruqaa', serif;
color:gold;

text-shadow:
0 0 5px white,
0 0 15px gold,
0 0 25px #B8860B;

}

/* الساعة */

.clock{

font-size:60px;
margin-top:10px;

}

/* التاريخ */

.date{

font-size:25px;
margin-top:10px;

}

/* الأذكار */

.azkar{

font-size:38px;
display:flex;
align-items:center;
justify-content:center;
height:40vh;
padding:20px;

}

/* شريط الصلاة */

.prayer-bar{

display:flex;
justify-content:space-around;
background:rgba(0,0,0,0.85);
padding:20px;
font-size:24px;

}

.prayer span{

display:block;

}

.iqama{

color:gold;
font-weight:bold;

}

</style>

</head>

<body>

<div class="header">

<h1>جامع الأمير فواز</h1>

<div id="clock" class="clock"></div>

<div id="date" class="date"></div>

</div>

<div id="azkar" class="azkar"></div>

<div id="prayers" class="prayer-bar"></div>

<script>

/* الساعة */

function updateClock(){

let now=new Date()

let h=now.getHours()
let m=now.getMinutes()

let ampm=h>=12?'م':'ص'

h=h%12
h=h?h:12

m=m<10?'0'+m:m

document.getElementById("clock").innerHTML=h+":"+m+" "+ampm

}

setInterval(updateClock,1000)

updateClock()

/* التاريخ */

function updateDate(){

let now=new Date()

let greg=now.toLocaleDateString('ar-SA')

let hijri=new Intl.DateTimeFormat('ar-TN-u-ca-islamic',{

day:'numeric',
month:'long',
year:'numeric'

}).format(now)

document.getElementById("date").innerHTML=greg+" | "+hijri

}

updateDate()

/* مواقيت الصلاة */

let prayerTimes={

"الفجر":"05:25",
"الظهر":"12:30",
"العصر":"03:45",
"المغرب":"06:20",
"العشاء":"07:50"

}

function addMinutes(time,min){

let p=time.split(":")

let d=new Date()

d.setHours(p[0])
d.setMinutes(parseInt(p[1])+min)

let h=d.getHours()
let m=d.getMinutes()

let ampm=h>=12?'م':'ص'

h=h%12
h=h?h:12

m=m<10?'0'+m:m

return h+":"+m+" "+ampm

}

let prayers=document.getElementById("prayers")

for(let p in prayerTimes){

let div=document.createElement("div")

div.className="prayer"

div.innerHTML=

"<span>"+p+"</span>"+
"<span>"+addMinutes(prayerTimes[p],0)+"</span>"+
"<span class='iqama'>الإقامة "+addMinutes(prayerTimes[p],10)+"</span>"

prayers.appendChild(div)

}

/* الأذكار */

let azkar=[

"سبحان الله",
"الحمد لله",
"الله أكبر",
"لا إله إلا الله",
"اللهم صل وسلم على نبينا محمد",
"أستغفر الله العظيم",
"لا حول ولا قوة إلا بالله"

]

let azkarDiv=document.getElementById("azkar")

let i=0

function changeZikr(){

azkarDiv.innerHTML=azkar[i]

i++

if(i>=azkar.length){i=0}

}

setInterval(changeZikr,5000)

changeZikr()

</script>

</body>

</html>
