<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة جامع الأمير فواز</title>

    <!-- خطوط عربية مميزة -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            color: white;
            text-align: center;
            /* خلفية المسجد النبوي الشريف */
            background: url('https://upload.wikimedia.org') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        /* طبقة حماية لجعل النص واضحاً فوق الصورة */
        .overlay {
            background: rgba(0, 0, 0, 0.65);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* ===== القسم العلوي (العنوان والوقت) ===== */
        .header {
            padding: 40px 20px;
        }

        .header h1 {
            margin: 0;
            font-size: clamp(40px, 8vw, 75px);
            color: #FFD700;
            font-family: 'Aref Ruqaa', serif;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8), 0 0 10px #B8860B;
        }

        .date {
            font-size: clamp(18px, 3vw, 24px);
            margin-top: 10px;
            color: #f0f0f0;
        }

        .clock {
            font-size: clamp(50px, 10vw, 90px);
            font-weight: bold;
            color: #00FF99;
            margin-top: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 153, 0.5);
        }

        /* ===== القسم الأوسط (الأذكار) ===== */
        .azkar-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .azkar {
            font-size: clamp(24px, 5vw, 42px);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            width: 80%;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Amiri', serif;
            line-height: 1.6;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ===== القسم السفلي (أوقات الصلاة) ===== */
        .prayer-bar {
            background: rgba(0, 0, 0, 0.85);
            padding: 25px 10px;
            display: flex;
            justify-content: space-around;
            flex-wrap: nowrap;
            border-top: 3px solid #FFD700;
        }

        .prayer {
            flex: 1;
            border-left: 1px solid rgba(255,215,0,0.2);
        }

        .prayer:last-child { border-left: none; }

        .prayer h3 {
            margin: 0;
            font-size: 28px;
            color: #FFD700;
        }

        .prayer .time-label {
            display: block;
            font-size: 20px;
            margin: 5px 0;
            color: #ddd;
        }

        .countdown {
            color: #00FF99;
            font-size: 16px;
            font-weight: bold;
            height: 20px;
        }

        @media (max-width: 768px) {
            .prayer-bar { flex-wrap: wrap; }
            .prayer { flex-basis: 33%; margin-bottom: 15px; }
        }
    </style>
</head>

<body>
    <div class="overlay">
        <div class="header">
            <h1>جامع الأمير فواز</h1>
            <div class="date" id="date">تحميل التاريخ...</div>
            <div class="clock" id="clock">00:00:00</div>
        </div>

        <div class="azkar-box">
            <div class="azkar" id="azkar">ألا بذكر الله تطمئن القلوب...</div>
        </div>

        <div class="prayer-bar" id="prayers">
            <!-- سيتم تعبئة أوقات الصلاة بواسطة JavaScript -->
        </div>
    </div>

<script>
    /* تحديث الساعة */
    function updateClock() {
        const now = new Date();
        let h = now.getHours();
        let m = now.getMinutes();
        let s = now.getSeconds();
        let ampm = h >= 12 ? 'م' : 'ص';
        h = h % 12 || 12;
        m = m < 10 ? '0' + m : m;
        s = s < 10 ? '0' + s : s;
        document.getElementById("clock").innerText = `${h}:${m}:${s} ${ampm}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* تحديث التاريخ */
    function updateDate() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const greg = now.toLocaleDateString('ar-SA', options);
        const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);
        document.getElementById("date").innerText = `${greg} | ${hijri}`;
    }
    updateDate();

    /* جلب أوقات الصلاة لمدينة جدة */
    async function loadPrayerTimes() {
        try {
            const res = await fetch("https://api.aladhan.com");
            const data = await res.json();
            const t = data.data.timings;

            const prayerNames = {
                "Fajr": "الفجر",
                "Dhuhr": "الظهر",
                "Asr": "العصر",
                "Maghrib": "المغرب",
                "Isha": "العشاء"
            };

            const container = document.getElementById("prayers");
            container.innerHTML = "";

            for (let [key, name] of Object.entries(prayerNames)) {
                let time = t[key];
                let iqama = addMinutes(time, 15); // وقت الإقامة بعد 15 دقيقة

                let div = document.createElement("div");
                div.className = "prayer";
                div.innerHTML = `
                    <h3>${name}</h3>
                    <span class="time-label">الأذان: ${format12(time)}</span>
                    <span class="time-label">الإقامة: ${format12(iqama)}</span>
                    <div class="countdown" id="count_${key}"></div>
                `;
                container.appendChild(div);
                startCountdown(key, iqama);
            }
        } catch (e) {
            document.getElementById("prayers").innerText = "خطأ في تحميل أوقات الصلاة";
        }
    }
    loadPrayerTimes();

    function format12(t) {
        let [h, m] = t.split(':');
        h = parseInt(h);
        let ampm = h >= 12 ? 'م' : 'ص';
        h = h % 12 || 12;
        return `${h}:${m} ${ampm}`;
    }

    function addMinutes(t, mins) {
        let [h, m] = t.split(':');
        let d = new Date();
        d.setHours(h, m, 0);
        d.setMinutes(d.getMinutes() + mins);
        return `${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function startCountdown(id, iqamaTime) {
        setInterval(() => {
            let [h, m] = iqamaTime.split(':');
            let target = new Date();
            target.setHours(h, m, 0);
            let diff = target - new Date();
            
            let el = document.getElementById("count_" + id);
            if (diff > 0) {
                let mins = Math.floor(diff / 60000);
                let secs = Math.floor((diff % 60000) / 1000);
                el.innerText = `باقي ${mins}:${secs} ص`;
            } else {
                el.innerText = "حان وقت الصلاة";
                el.style.color = "#FF4500";
            }
        }, 1000);
    }

    /* تغيير الأذكار تلقائياً */
    const azkarList = [
        "سبحان الله وبحمده، سبحان الله العظيم",
        "لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير",
        "اللهم صلِّ وسلم على نبينا محمد",
        "أستغفر الله الذي لا إله إلا هو الحي القيوم وأتوب إليه",
        "اللهم أنت السلام ومنك السلام تباركت يا ذا الجلال والإكرام",
        "سبحان الله، والحمد لله، ولا إله إلا الله، والله أكبر"
    ];
    let index = 0;
    setInterval(() => {
        index = (index + 1) % azkarList.length;
        document.getElementById("azkar").innerText = azkarList[index];
    }, 10000);
</script>
</body>
</html>
