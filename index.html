<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسجد الأمير فواز</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Amiri', serif;
    color:white;
    text-align:center;
    background:
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
        url('https://images.pexels.com/photos/2087391/pexels-photo-2087391.jpeg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* اسم المسجد */
.mosque-name{
    font-size:65px;
    color:gold;
    margin-top:20px;
    text-shadow:2px 2px 10px black;
}

/* الساعة */
.clock-container{
    margin:20px auto;
}

#clock{
    width:260px;
    height:260px;
    border:10px solid gold;
    border-radius:50%;
    margin:auto;
    position:relative;
    background:white;
}

.hand{
    position:absolute;
    bottom:50%;
    left:50%;
    transform-origin:bottom;
    transform:translateX(-50%);
}

.hour{ width:8px; height:70px; background:black; }
.minute{ width:6px; height:95px; background:black; }
.second{ width:2px; height:110px; background:red; }

#digitalClock{
    font-size:50px;
    margin-top:15px;
}

/* التاريخ */
#todayDate{
    font-size:32px;
    color:gold;
    margin-top:10px;
}

/* جدول الصلاة */
table{
    width:90%;
    margin:30px auto;
    border-collapse:collapse;
    font-size:34px;
    background:rgba(0,0,0,0.5);
}

th,td{
    padding:18px;
    border:1px solid gold;
}

th{
    background:#0d3f3f;
    color:gold;
}

.next{
    background:darkgreen;
    color:white;
}

/* عداد */
#countdown{
    font-size:42px;
    margin-top:20px;
    color:yellow;
    text-shadow:2px 2px 10px black;
}

/* الأذكار */
#azkar{
    margin:30px;
    font-size:30px;
    padding:20px;
    background:rgba(0,0,0,0.4);
    border-top:2px solid gold;
}

</style>
</head>
<body>

<div class="mosque-name">مسجد الأمير فواز</div>

<div class="clock-container">
    <div id="clock">
        <div class="hand hour" id="hour"></div>
        <div class="hand minute" id="minute"></div>
        <div class="hand second" id="second"></div>
    </div>
    <div id="digitalClock"></div>
</div>

<div id="todayDate"></div>
<div id="countdown"></div>

<table>
<thead>
<tr>
<th>الصلاة</th>
<th>الأذان</th>
<th>الإقامة (+10)</th>
</tr>
</thead>
<tbody id="prayerTable"></tbody>
</table>

<div id="azkar"></div>

<script>

// ===== الساعة =====
function updateClock(){
    const now=new Date();
    const h=now.getHours();
    const m=now.getMinutes();
    const s=now.getSeconds();

    document.getElementById("hour").style.transform=
        `translateX(-50%) rotate(${h*30 + m/2}deg)`;
    document.getElementById("minute").style.transform=
        `translateX(-50%) rotate(${m*6}deg)`;
    document.getElementById("second").style.transform=
        `translateX(-50%) rotate(${s*6}deg)`;

    document.getElementById("digitalClock").innerText=
        now.toLocaleTimeString('ar-SA',{hour12:true});
}
setInterval(updateClock,1000);


// ===== التاريخ =====
function updateDate(){
    const now=new Date();

    const greg=now.toLocaleDateString('ar-SA',{
        weekday:'long',
        year:'numeric',
        month:'long',
        day:'numeric'
    });

    fetch("https://api.aladhan.com/v1/gToH?date="
    + now.getDate()+"-"+(now.getMonth()+1)+"-"+now.getFullYear())
    .then(res=>res.json())
    .then(data=>{
        const h=data.data.hijri;
        const hijri=
        h.weekday.ar+" "+
        h.day+" "+
        h.month.ar+" "+
        h.year+" هـ";

        document.getElementById("todayDate").innerHTML=
        greg+"<br>"+hijri;
    });
}
updateDate();


// ===== مواقيت الصلاة - جدة =====
fetch("https://api.aladhan.com/v1/timingsByCity?city=Jeddah&country=SA")
.then(res=>res.json())
.then(data=>{

    const prayers={
        "الفجر":data.data.timings.Fajr,
        "الظهر":data.data.timings.Dhuhr,
        "العصر":data.data.timings.Asr,
        "المغرب":data.data.timings.Maghrib,
        "العشاء":data.data.timings.Isha
    };

    const table=document.getElementById("prayerTable");
    const now=new Date();

    let nextPrayerTime=null;
    let nextRow=null;

    Object.keys(prayers).forEach(name=>{
        const adhan=prayers[name];
        const [h,m]=adhan.split(":");

        const adhanDate=new Date();
        adhanDate.setHours(h,m,0);

        const iqamaDate=new Date(adhanDate.getTime()+10*60000);
        const iqama=iqamaDate.toLocaleTimeString('ar-SA',{hour12:true});

        const row=document.createElement("tr");

        if(!nextPrayerTime && adhanDate>now){
            nextPrayerTime=adhanDate;
            nextRow=row;
        }

        row.innerHTML=
        `<td>${name}</td>
         <td>${adhanDate.toLocaleTimeString('ar-SA',{hour12:true})}</td>
         <td>${iqama}</td>`;

        table.appendChild(row);
    });

    if(nextRow) nextRow.classList.add("next");

    function updateCountdown(){
        if(!nextPrayerTime) return;

        const diff=nextPrayerTime-new Date();
        if(diff<=0) return;

        const h=Math.floor(diff/1000/60/60);
        const m=Math.floor((diff/1000/60)%60);
        const s=Math.floor((diff/1000)%60);

        document.getElementById("countdown").innerText=
        "متبقي على الصلاة القادمة: "+
        h+" ساعة "+m+" دقيقة "+s+" ثانية";
    }

    setInterval(updateCountdown,1000);

});


// ===== الأذكار =====
const azkarList=[
"سبحان الله وبحمده، سبحان الله العظيم",
"اللهم صل وسلم على نبينا محمد",
"لا إله إلا الله وحده لا شريك له",
"أستغفر الله العظيم وأتوب إليه",
"اللهم اغفر للمسلمين والمسلمات"
];

let azkarIndex=0;

function changeZikr(){
    document.getElementById("azkar").innerText=
    azkarList[azkarIndex];
    azkarIndex=(azkarIndex+1)%azkarList.length;
}

changeZikr();
setInterval(changeZikr,10000);

</script>

</body>
</html>
