<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مسجد الأمير فواز - جدة</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: Tahoma, Arial;
}

/* رأس الصفحة */
.header {
  position: absolute;
  top: 0;
  width: 100%;
  text-align: center;
  background: black;
  color: white;
  padding: 20px 0;
  z-index: 10;
}
.header h1 {
  margin: 0;
  font-size: 56px;
}
.header h2 {
  margin: 8px 0 0;
  font-size: 36px;
  color: #00ff99;
}

/* حاوية القص */
.viewer {
  position: absolute;
  top: 140px;
  width: 100%;
  height: calc(100% - 140px);
  overflow: hidden; /* مهم جدًا */
}

/* iframe نفسه */
iframe {
  width: 160%;          /* تكبير العرض */
  height: 160%;         /* تكبير الارتفاع */
  border: none;

  /* تحريك الصفحة لإظهار الجزء الأيسر فقط */
  transform: translateX(-50%) translateY(-10%) scale(1.2);
  transform-origin: top left;
}
</style>
</head>

<body>

<div class="header">
  <h1>مسجد الأمير فواز</h1>
  <h2>جدة</h2>
</div>

<div class="viewer">
  <iframe src="https://muslimsalat.com/jeddah"></iframe>
</div>

</body>
</html>
