<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مسجد الامير فواز</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#0e0e0e;
font-family:'Tahoma';
color:white;
overflow:hidden;
}

/* خلفية إسلامية */
body::before{
content:"";
position:fixed;
inset:0;
background-image:url('https://www.transparenttextures.com/patterns/arabesque.png');
opacity:0.08;
}

/* الشريط العلوي */
.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
color:#d4af37;
font-size:22px;
border-bottom:3px solid #d4af37;
}

.mosque{
font-size:36px;
font-weight:bold;
}

/* المحتوى */
.main{
display:flex;
height:70vh;
padding:30px;
}

/* صندوق الآية */
.verse{
flex:2;
background:linear-gradient(145deg,#caa933,#f5d77a);
border-radius:25px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px;
font-size:40px;
color:#000;
box-shadow:0 0 50px rgba(212,175,55,0.5);
}

/* الساعة */
.clock-box{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.clock{
width:260px;
height:260px;
border:10px solid #d4af37;
border-radius:50%;
background:white;
position:relative;
}

.hand{
position:absolute;
bottom:50%;
left:50%;
transform-origin:bottom;
transform:translateX(-50%);
}

.hour{
width:6px;
height:70px;
background:#000;
}

.minute{
width:4px;
height:100px;
background:#000;
}

.second{
width:2px;
height:120px;
background:red;
}

.center{
position:absolute;
width:15px;
height:15px;
background:#d4af37;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.digital{
margin-top:20px;
font-size:45px;
color:#ff3333;
}

/* الشريط السفلي */
.bottom{
position:absolute;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#000;
border-top:4px solid #d4af37;
padding:25px 0;
}

.prayer{
font-size:36px;
color:#d4af37;
text-align:center;
}

.prayer span{
display:block;
font-size:50px;
color:white;
margin-top:5px;
}

.active{
color:#00ff00;
}

</style>
</head>
<body>

<div class="top">
<div class="mosque">🕌 مسجد الامير فواز</div>
<div id="date"></div>
<div id="weather"></div>
</div>

<div class="main">

<div class="verse">
إِنَّ ٱللَّهَ وَمَلَـٰٓئِكَتَهُ يُصَلُّونَ عَلَى ٱلنَّبِىِّ
يَـٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوا۟ صَلُّوا۟ عَلَيْهِ وَسَلِّمُوا۟ تَسْلِيمًا
</div>

<div class="clock-box">
<div class="clock">
<div class="hand hour" id="hour"></div>
<div class="hand minute" id="minute"></div>
<div class="hand second" id="second"></div>
<div class="center"></div>
</div>
<div class="digital" id="digital"></div>
</div>

</div>

<div class="bottom" id="prayerBar"></div>

<script>

// التاريخ
function updateDate(){
const now=new Date();
document.getElementById("date").innerText=
now.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
updateDate();

// الساعة العقارب + الرقمية
function updateClock(){
const now=new Date();

let h=now.getHours()%12;
let m=now.getMinutes();
let s=now.getSeconds();

document.getElementById("hour").style.transform=
`translateX(-50%) rotate(${(h*30)+(m/2)}deg)`;

document.getElementById("minute").style.transform=
`translateX(-50%) rotate(${m*6}deg)`;

document.getElementById("second").style.transform=
`translateX(-50%) rotate(${s*6}deg)`;

document.getElementById("digital").innerText=
now.toLocaleTimeString('ar-SA');
}
setInterval(updateClock,1000);
updateClock();

// مواقيت الصلاة
async function getPrayerTimes(){
const res=await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Jeddah&country=Saudi Arabia&method=4`);
const data=await res.json();
const t=data.data.timings;

const prayers={
الفجر:t.Fajr,
الشروق:t.Sunrise,
الظهر:t.Dhuhr,
العصر:t.Asr,
المغرب:t.Maghrib,
العشاء:t.Isha
};

let html="";
for(let name in prayers){
html+=`<div class="prayer">${name}<span>${prayers[name]}</span></div>`;
}
document.getElementById("prayerBar").innerHTML=html;
}
getPrayerTimes();

</script>

</body>
</html>
