<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مسجد الأمير فواز - جدة</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: Tahoma, Arial;
}
.header {
  position: absolute;
  top: 0;
  width: 100%;
  text-align: center;
  background: black;
  color: white;
  padding: 20px 0;
  z-index: 10;
}
.header h1 {
  margin: 0;
  font-size: 56px;
}
.header h2 {
  margin: 8px 0 0;
  font-size: 36px;
  color: #00ff99;
}
.iframe-container {
  position: absolute;
  top: 140px;
  width: 100%;
  height: calc(100% - 140px);
}
iframe {
  width: 100%;
  height: 100%;
  border: none;
  transform: scale(1.15);
  transform-origin: top center;
}
</style>
</head>

<body>

<div class="header">
  <h1>مسجد الأمير فواز</h1>
  <h2>جدة</h2>
</div>

<div class="iframe-container">
  <iframe src="https://muslimsalat.com/jeddah"></iframe>
</div>

</body>
</html>
