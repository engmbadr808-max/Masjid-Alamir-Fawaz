<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسجد الامير فواز - مواقيت الصلاة</title>

<style>
body {
    margin: 0;
    font-family: 'Tahoma', sans-serif;
    background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

/* اسم المسجد */
.mosque-name {
    font-size: 50px;
    font-weight: bold;
    margin-top: 20px;
    color: #00FFCC;
}

/* الساعة */
.clock {
    font-size: 80px;
    font-weight: bold;
    margin-top: 10px;
    color: #FFD700;
}

.date {
    font-size: 28px;
    margin-bottom: 30px;
}

.prayer-container {
    width: 60%;
    margin: auto;
}

.prayer {
    background: rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 20px;
    font-size: 35px;
    display: flex;
    justify-content: space-between;
}

.prayer-name {
    font-weight: bold;
}

.footer {
    margin-top: 40px;
    font-size: 22px;
}
</style>
</head>

<body>

<div class="mosque-name">🕌 مسجد الامير فواز</div>
<div class="clock" id="clock"></div>
<div class="date" id="date"></div>

<div class="prayer-container" id="prayerTimes"></div>

<div class="footer">نسأل الله القبول</div>

<script>
const city = "Jeddah";
const country = "Saudi Arabia";

/* تحديث الساعة */
function updateClock() {
    const now = new Date();
    const timeString = now.toLocaleTimeString('ar-SA', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
    });
    document.getElementById("clock").innerText = timeString;
}

setInterval(updateClock, 1000);
updateClock();

/* جلب مواقيت الصلاة */
async function getPrayerTimes() {
    const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=${country}&method=4`);
    const data = await response.json();

    const timings = data.data.timings;

    const prayers = {
        "الفجر": timings.Fajr,
        "الظهر": timings.Dhuhr,
        "العصر": timings.Asr,
        "المغرب": timings.Maghrib,
        "العشاء": timings.Isha
    };

    const container = document.getElementById("prayerTimes");
    container.innerHTML = "";

    for (const [name, time] of Object.entries(prayers)) {
        container.innerHTML += `
            <div class="prayer">
                <div class="prayer-name">${name}</div>
                <div>${time}</div>
            </div>
        `;
    }

    document.getElementById("date").innerText =
        data.data.date.hijri.date + " هـ | " +
        data.data.date.gregorian.date;
}

getPrayerTimes();
</script>

</body>
</html>
