<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">

<title>جامع الأمير فواز</title>

<style>

body{
margin:0;
font-family:'Tahoma', sans-serif;
background:black;
overflow:hidden;
}

/* تدوير الصفحة */
.rotate{
position:absolute;
top:50%;
left:50%;
transform:rotate(90deg) translate(-50%,-50%);
transform-origin:center;
width:100vh;
height:100vw;
}

/* الخلفية */
.container{
color:white;
text-align:center;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
background:url("https://upload.wikimedia.org/wikipedia/commons/3/3f/Al-Masjid_an-Nabawi_Medina.jpg") no-repeat center center fixed;
background-size:cover;
}

/* طبقة تعتيم */
.container::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* العنوان */
.header{
padding:30px 0;
}

.header h1{
margin:0;
font-size:70px;
color:#FFD700;
font-family:'Aref Ruqaa', serif;
text-shadow:
0 0 5px #fff,
0 0 15px #FFD700,
0 0 25px #B8860B,
2px 2px 10px black;
}

.date{
font-size:22px;
margin-top:10px;
}

.clock{
font-size:60px;
margin-top:10px;
}

/* الأذكار */
.azkar{
font-size:35px;
padding:0 20px;
min-height:120px;
display:flex;
align-items:center;
justify-content:center;
}

/* شريط الصلوات */
.prayer-bar{
background:rgba(0,0,0,0.8);
padding:15px 0;
display:flex;
justify-content:space-around;
font-size:20px;
}

.prayer{
text-align:center;
}

.prayer span{
display:block;
}

.iqama{
color:#FFD700;
font-weight:bold;
}

</style>
</head>
<body>

<div class="rotate">
<div class="container">

<div class="header">
<h1>جامع الأمير فواز</h1>
<div class="date" id="date"></div>
<div class="clock" id="clock"></div>
</div>

<div class="azkar" id="azkar"></div>

<div class="prayer-bar" id="prayers"></div>

</div>
</div>

<script>

/* الساعة */
function updateClock(){
let now = new Date();

let hours = now.getHours();
let minutes = now.getMinutes();
let ampm = hours >= 12 ? 'م' : 'ص';

hours = hours % 12;
hours = hours ? hours : 12;

minutes = minutes < 10 ? '0'+minutes : minutes;

document.getElementById("clock").innerHTML =
hours + ":" + minutes + " " + ampm;
}

setInterval(updateClock,1000);
updateClock();

/* التاريخ */
function updateDate(){

let now = new Date();

let greg = now.toLocaleDateString('ar-SA');

let hijri = new Intl.DateTimeFormat('ar-TN-u-ca-islamic',{
day:'numeric',
month:'long',
year:'numeric'
}).format(now);

document.getElementById("date").innerHTML =
"📅 "+greg+" | "+hijri;

}

updateDate();

/* مواقيت الصلاة */
let prayerTimes = {

"الفجر":"05:25",
"الظهر":"12:30",
"العصر":"03:45",
"المغرب":"06:20",
"العشاء":"07:50"

};

function addMinutes(time,mins){

let parts=time.split(":");

let date=new Date();

date.setHours(parts[0]);
date.setMinutes(parseInt(parts[1])+mins);

let h=date.getHours();
let m=date.getMinutes();

let ampm=h>=12?'م':'ص';

h=h%12;
h=h?h:12;

m=m<10?'0'+m:m;

return h+":"+m+" "+ampm;

}

let prayerBar=document.getElementById("prayers");

for(let p in prayerTimes){

let div=document.createElement("div");
div.className="prayer";

div.innerHTML=

"<span>"+p+"</span>"+
"<span>"+addMinutes(prayerTimes[p],0)+"</span>"+
"<span class='iqama'>الإقامة "+addMinutes(prayerTimes[p],10)+"</span>";

prayerBar.appendChild(div);

}

/* الأذكار */

let azkarList=[

"سبحان الله",
"الحمد لله",
"الله أكبر",
"لا إله إلا الله",
"اللهم صل وسلم على نبينا محمد",
"أستغفر الله العظيم",
"لا حول ولا قوة إلا بالله"

];

let azkarDiv=document.getElementById("azkar");

let i=0;

function changeZikr(){

azkarDiv.innerHTML=azkarList[i];

i++;

if(i>=azkarList.length){
i=0;
}

}

setInterval(changeZikr,5000);

changeZikr();

</script>

</body>
</html>
